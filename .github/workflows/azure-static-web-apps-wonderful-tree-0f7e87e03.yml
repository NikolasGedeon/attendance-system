name: Deploy Flutter Web to Azure Static Web Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Flutter entry point exists
        run: |
          pwd
          ls -la
          ls -la attendance_app
          ls -la attendance_app/lib
          test -f attendance_app/lib/main_mobile.dart

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: |
          cd attendance_app
          flutter pub get

      - name: Build Flutter web
        run: |
          cd attendance_app
          flutter build web \
            --release \
            --target lib/main_mobile.dart \
            --dart-define=API_BASE_URL=https://marfields-attendance.azurewebsites.net

      - name: Verify web build
        run: |
          test -f attendance_app/build/web/index.html
          ls -la attendance_app/build/web

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_TREE_0F7E87E03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: attendance_app/build/web
          api_location: ""
          output_location: ""
          skip_app_build: true
